<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌿 Robot Détection Mauvaises Herbes</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0f1923; color: #fff; font-family: 'Segoe UI', sans-serif; }

        header {
            background: #1a2d1a;
            padding: 15px 30px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 2px solid #2ecc71;
        }
        header h1 { font-size: 1.4em; color: #2ecc71; }
        .status {
            margin-left: auto;
            background: #2ecc71;
            color: #000;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: bold;
        }

        .container {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            padding: 20px;
        }

        .left-col { display: flex; flex-direction: column; gap: 20px; }
        .right-col {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 90vh;
        }

        .live-section { display: flex; flex-direction: column; gap: 10px; }
        .live-label {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9em;
            color: #aaa;
        }
        .live-dot {
            width: 10px; height: 10px;
            background: red;
            border-radius: 50%;
            animation: blink 1s infinite;
        }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

        .stream-box {
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid #1a3a1a;
            height: 320px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .stream-box img { width: 100%; height: 100%; object-fit: contain; }

        .graph-box {
            background: #1a2a1a;
            border: 1px solid #2ecc71;
            border-radius: 12px;
            padding: 15px;
        }
        .graph-box h2 {
            color: #2ecc71;
            font-size: 0.95em;
            margin-bottom: 10px;
            padding-bottom: 5px;
            border-bottom: 1px solid #2ecc71;
        }
        .graph-box canvas { height: 220px !important; }
        .stats-row {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        .stat-badge {
            background: #0d3d0d;
            border: 1px solid #2ecc71;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8em;
            color: #2ecc71;
        }

        .detections-section {
            display: flex;
            flex-direction: column;
            gap: 10px;
            overflow: hidden;
        }
        .detections-section h2 {
            color: #2ecc71;
            font-size: 1em;
            padding-bottom: 5px;
            border-bottom: 1px solid #2ecc71;
        }
        .detections-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 85vh;
        }
        .detection-card {
            background: #1a2a1a;
            border: 1px solid #2ecc71;
            border-radius: 10px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            animation: fadeIn 0.5s;
        }
        @keyframes fadeIn { from{opacity:0;transform:translateY(-10px)} to{opacity:1;transform:translateY(0)} }
        .detection-card img {
            width: 100%;
            border-radius: 6px;
            max-height: 130px;
            object-fit: cover;
        }
        .detection-time { font-size: 0.75em; color: #aaa; }
        .coords { display: flex; gap: 8px; flex-wrap: wrap; }
        .coord-badge {
            background: #0d3d0d;
            border: 1px solid #2ecc71;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.8em;
            color: #2ecc71;
        }
        .conseil {
            background: #0a1f0a;
            border-left: 3px solid #f39c12;
            padding: 8px 10px;
            border-radius: 4px;
            font-size: 0.8em;
            color: #f39c12;
        }
        .detections-list::-webkit-scrollbar { width: 4px; }
        .detections-list::-webkit-scrollbar-thumb { background: #2ecc71; border-radius: 4px; }

        @media (max-width: 768px) {
            .container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header>
    <span style="font-size:1.5em">🌿</span>
    <h1>Robot Détection — Mauvaises Herbes</h1>
    <div class="status">● EN LIGNE</div>
</header>

<div class="container">
    <div class="left-col">

        <!-- Live -->
        <div class="live-section">
            <div class="live-label">
                <div class="live-dot"></div>
                <span>LIVE — Caméra Robot</span>
            </div>
            <div class="stream-box">
                <img src="/video_feed" alt="Live Robot">
            </div>
        </div>

        <!-- Graphe Mauvaises Herbes -->
        <div class="graph-box">
            <h2>🔴 Carte des Mauvaises Herbes (cm)</h2>
            <canvas id="mapChart"></canvas>
            <div class="stats-row">
                <span class="stat-badge" id="total-count">🌿 Total : 0</span>
                <span class="stat-badge" id="last-coord">📍 Dernière : —</span>
            </div>
        </div>

        <!-- Graphe Trajet Robot -->
        <div class="graph-box">
            <h2>🔵 Trajet du Robot (estimé à 10cm/s)</h2>
            <canvas id="pathChart"></canvas>
            <div class="stats-row">
                <span class="stat-badge" id="distance-info">📏 Distance : 0 cm</span>
                <span class="stat-badge" id="time-info">⏱️ Temps : 0s</span>
            </div>
        </div>

    </div>

    <!-- Détections -->
    <div class="right-col">
        <div class="detections-section">
            <h2>📸 Détections — Mauvaises Herbes</h2>
            <div class="detections-list" id="detections-list">
                <p style="color:#555; text-align:center; margin-top:30px">
                    En attente de détections...
                </p>
            </div>
        </div>
    </div>
</div>

<script>
// ── Graphe Mauvaises Herbes ──
const ctx1 = document.getElementById('mapChart').getContext('2d');
const mapChart = new Chart(ctx1, {
    type: 'scatter',
    data: {
        datasets: [{
            label: 'Mauvaises Herbes',
            data: [],
            backgroundColor: 'rgba(255,0,0,0.8)',
            borderColor: 'red',
            pointRadius: 10,
            pointHoverRadius: 14,
        }]
    },
    options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { labels: { color: '#2ecc71' } },
            tooltip: { callbacks: { label: c => `X:${c.parsed.x}cm Y:${c.parsed.y}cm` }}
        },
        scales: {
            x: { title:{display:true,text:'X (cm)',color:'#2ecc71'}, min:0, max:23, ticks:{color:'#aaa'}, grid:{color:'#1a3a1a'} },
            y: { title:{display:true,text:'Y (cm)',color:'#2ecc71'}, min:0, max:17, ticks:{color:'#aaa'}, grid:{color:'#1a3a1a'} }
        }
    }
});

// ── Graphe Trajet Robot ──
const ctx2 = document.getElementById('pathChart').getContext('2d');
const pathChart = new Chart(ctx2, {
    type: 'scatter',
    data: {
        datasets: [
            {
                label: 'Trajet Robot',
                data: [],
                borderColor: 'rgba(0,150,255,1)',
                backgroundColor: 'rgba(0,150,255,0.2)',
                showLine: true,
                pointRadius: 2,
                borderWidth: 2,
            },
            {
                label: 'Mauvaises Herbes',
                data: [],
                backgroundColor: 'rgba(255,0,0,0.8)',
                borderColor: 'red',
                pointRadius: 8,
            }
        ]
    },
    options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { labels: { color: '#2ecc71' } },
            tooltip: { callbacks: { label: c => `X:${c.parsed.x}cm Y:${c.parsed.y}cm` }}
        },
        scales: {
            x: { title:{display:true,text:'X (cm)',color:'#2ecc71'}, min:0, max:23, ticks:{color:'#aaa'}, grid:{color:'#1a3a1a'} },
            y: { title:{display:true,text:'Y (cm)',color:'#2ecc71'}, min:0, ticks:{color:'#aaa'}, grid:{color:'#1a3a1a'} }
        }
    }
});

let allPoints = [];
const startTime = Date.now();

// ── Mise à jour détections ──
function updateDetections() {
    fetch('/detections')
        .then(r => r.json())
        .then(data => {
            if (data.length === 0) return;
            const list = document.getElementById('detections-list');
            list.innerHTML = '';
            data.forEach(d => {
                const coordsHtml = d.coords.map(c =>
                    `<span class="coord-badge">X:${c.x_cm}cm Y:${c.y_cm}cm (${c.conf}%)</span>`
                ).join('');
                list.innerHTML += `
                    <div class="detection-card">
                        <img src="/screenshot/${d.image}" alt="Detection ${d.id}">
                        <div class="detection-time">🕐 ${d.timestamp} — Détection #${d.id}</div>
                        <div class="coords">${coordsHtml}</div>
                        <div class="conseil">💡 ${d.conseil}</div>
                    </div>`;
            });

            allPoints = [];
            data.forEach(d => {
                d.coords.forEach(c => allPoints.push({ x: c.x_cm, y: c.y_cm }));
            });

            mapChart.data.datasets[0].data = allPoints;
            mapChart.update();

            document.getElementById('total-count').textContent = `🌿 Total : ${allPoints.length}`;
            if (allPoints.length > 0) {
                const last = allPoints[0];
                document.getElementById('last-coord').textContent = `📍 X=${last.x}cm, Y=${last.y}cm`;
            }
        });
}

// ── Mise à jour trajet ──
function updatePath() {
    fetch('/robot_path')
        .then(r => r.json())
        .then(path => {
            pathChart.data.datasets[0].data = path;
            pathChart.data.datasets[1].data = allPoints;
            pathChart.update();

            const elapsed = Math.round((Date.now() - startTime) / 1000);
            const dist = elapsed * 10;
            document.getElementById('distance-info').textContent = `📏 Distance : ${dist} cm`;
            document.getElementById('time-info').textContent = `⏱️ Temps : ${elapsed}s`;
        });
}

setInterval(updateDetections, 2000);
setInterval(updatePath, 1000);
updateDetections();
updatePath();
</script>

</body>
</html>
